<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理ログイン | しみず整骨院</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: var(--color-bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>管理ログイン</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username" class="form-label">ユーザー名</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">パスワード</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <div class="form-submit" style="margin-top: 30px;">
                <button type="submit" class="btn btn--reserve" style="width: 100%;">ログイン</button>
            </div>
        </form>
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #888; font-size: 0.9rem;">← トップページに戻る</a>
        </div>
        <p id="errorMsg" style="color: red; text-align: center; margin-top: 15px; display: none;">ユーザー名またはパスワードが違います</p>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbx8zQWxQw2YUbreWgkeELi7gj50RQHxquL7_7OnvyaOvegsCod9m0lvtma5kuiI-asb/exec';

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.style.display = 'none';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        user: user,
                        pass: pass
                    })
                });
                const result = await response.json();

                if (result.success) {
                    sessionStorage.setItem('isAdmin', 'true');
                    sessionStorage.setItem('adminUser', user);
                    sessionStorage.setItem('adminPass', pass);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
