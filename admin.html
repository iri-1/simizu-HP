<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理ダッシュボード | しみず整骨院</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Check if logged in
        if (sessionStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>
    <header class="header">
        <div class="header__inner">
            <h1 class="header__logo">
                <a href="index.html">
                    <span class="logo-mark">清</span>
                    <span class="logo-text">しみず整骨院 管理画面</span>
                </a>
            </h1>
            <nav class="header__nav">
                <ul class="nav-list">
                    <li><a href="index.html">サイトを確認する</a></li>
                    <li><a href="#" id="logoutBtn" style="color: #d0021b;">ログアウト</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-header">
            <h2>お知らせ管理</h2>
        </div>

        <div class="admin-main">
            <h3>新規お知らせ投稿</h3>
            <form id="newsForm" class="admin-form" style="margin-top: 20px;">
                <div class="form-group" style="display: flex; gap: 20px;">
                    <div style="flex: 1;">
                        <label for="newsDate" class="form-label">日付</label>
                        <input type="date" id="newsDate" class="form-control" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="newsCategory" class="form-label">カテゴリー (任意)</label>
                        <input type="text" id="newsCategory" class="form-control" placeholder="例：休診情報">
                    </div>
                </div>

                <div class="form-group">
                    <label for="newsTitle" class="form-label">タイトル</label>
                    <input type="text" id="newsTitle" class="form-control" required placeholder="お知らせのタイトル">
                </div>

                <div class="form-group">
                    <label for="newsContent" class="form-label">内容 (任意)</label>
                    <textarea id="newsContent" class="form-control" rows="4" placeholder="詳細な内容があればご記入ください。"></textarea>
                </div>

                <button type="submit" class="btn btn--reserve">投稿する</button>
            </form>

            <div class="admin-list">
                <h3>投稿済みのお知らせ</h3>
                <div id="adminNewsList" style="margin-top: 15px;">
                    <!-- News items will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // API Configuration - Replace with your actual GAS Web App URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbx8zQWxQw2YUbreWgkeELi7gj50RQHxquL7_7OnvyaOvegsCod9m0lvtma5kuiI-asb/exec';

        // Check if logged in
        if (sessionStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }

        const adminUser = sessionStorage.getItem('adminUser');
        const adminPass = sessionStorage.getItem('adminPass');
        if (!adminUser || !adminPass) {
            sessionStorage.removeItem('isAdmin');
            sessionStorage.removeItem('adminUser');
            sessionStorage.removeItem('adminPass');
            window.location.href = 'login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.removeItem('isAdmin');
            sessionStorage.removeItem('adminUser');
            sessionStorage.removeItem('adminPass');
            window.location.href = 'login.html';
        });

        // Set today's date
        document.getElementById('newsDate').valueAsDate = new Date();

        async function loadAdminNews() {
            const container = document.getElementById('adminNewsList');
            container.innerHTML = '<p style="color: #888;">読み込み中...</p>';

            try {
                const response = await fetch(`${API_URL}?type=news`);
                const newsList = await response.json();
                container.innerHTML = '';

                if (!newsList || newsList.length === 0) {
                    container.innerHTML = '<p style="color: #888;">投稿されたお知らせはありません。</p>';
                    return;
                }

                newsList.forEach((news) => {
                    const div = document.createElement('div');
                    div.className = 'admin-list__item';
                    div.innerHTML = `
                        <div class="admin-list__info">
                            <div class="admin-news-item-date">${news.date} ${news.category ? `<span class="news-item__badge">${news.category}</span>` : ''}</div>
                            <div class="admin-news-item-title">${news.title}</div>
                        </div>
                        <div class="admin-list__actions">
                            <button class="btn btn--small btn--danger delete-btn" data-id="${news.id}">削除</button>
                        </div>
                    `;
                    container.appendChild(div);
                });

                // Add delete listeners
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async function () {
                        if (confirm('本当にこのお知らせを削除しますか？')) {
                            const id = this.getAttribute('data-id');
                            this.disabled = true;
                            this.textContent = '削除中...';

                            try {
                                const response = await fetch(API_URL, {
                                    method: 'POST',
                                    body: JSON.stringify({
                                        type: 'news',
                                        action: 'delete',
                                        id: id,
                                        adminUser: adminUser,
                                        adminPass: adminPass
                                    })
                                });
                                const result = await response.json();
                                if (result.success) {
                                    loadAdminNews();
                                } else {
                                    throw new Error(result.error);
                                }
                            } catch (err) {
                                console.error('Delete error:', err);
                                alert('削除に失敗しました。');
                                this.disabled = false;
                                this.textContent = '削除';
                            }
                        }
                    });
                });
            } catch (error) {
                console.error('Fetch error:', error);
                container.innerHTML = '<p style="color: #d0021b;">データの取得に失敗しました。</p>';
            }
        }

        document.getElementById('newsForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '投稿中...';

            const dateStr = document.getElementById('newsDate').value;
            const d = new Date(dateStr);
            const formattedDate = `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;

            const payload = {
                type: 'news',
                action: 'create',
                date: formattedDate,
                category: document.getElementById('newsCategory').value,
                title: document.getElementById('newsTitle').value,
                content: document.getElementById('newsContent').value,
                id: Date.now().toString(),
                adminUser: adminUser,
                adminPass: adminPass
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    // Reset form
                    document.getElementById('newsTitle').value = '';
                    document.getElementById('newsContent').value = '';
                    document.getElementById('newsCategory').value = '';
                    alert('お知らせを投稿しました！');
                    loadAdminNews();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Post error:', error);
                alert('投稿に失敗しました。');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '投稿する';
            }
        });

        // Initial load
        loadAdminNews();
    </script>
</body>

</html>
